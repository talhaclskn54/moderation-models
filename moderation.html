<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://unpkg.com/nsfwjs"></script>

<script>

let model = null;

const PORN_LIMIT = 0.10;
const HENTAI_LIMIT = 0.10;
const SEXY_LIMIT = 0.45;

async function loadModel(){

    try{

        document.getElementById("status").innerText =
        "Model yükleniyor...";

        model = await nsfwjs.load();

        document.getElementById("status").innerText =
        "Moderation Sistemi Hazır";

    }catch(error){

        document.getElementById("status").innerText =
        error.message;

        console.error(error);

    }

}

loadModel();

function sendResult(safe,reason){

    window.parent.postMessage({
        type:"MODERATION_RESULT",
        safe:safe,
        reason:reason
    },"*");

}

window.addEventListener("message",async(event)=>{

    if(!event.data) return;

    if(event.data.type !== "CHECK_IMAGE") return;

    try{

        if(!model){

            sendResult(false,"MODEL_NOT_READY");
            return;

        }

        const img = new Image();

        img.crossOrigin = "anonymous";

        img.onload = async ()=>{

            const predictions =
            await model.classify(img);

            let porn = 0;
            let hentai = 0;
            let sexy = 0;

            predictions.forEach(item=>{

                if(item.className==="Porn")
                    porn=item.probability;

                if(item.className==="Hentai")
                    hentai=item.probability;

                if(item.className==="Sexy")
                    sexy=item.probability;

            });

            const blocked =

                porn>PORN_LIMIT ||
                hentai>HENTAI_LIMIT ||
                sexy>SEXY_LIMIT;

            if(blocked){

                sendResult(false,"NSFW_DETECTED");

            }else{

                sendResult(true,"SAFE");

            }

        };

        img.src = event.data.image;

    }catch(error){

        console.error(error);

        sendResult(false,"CHECK_FAILED");

    }

});

</script>
