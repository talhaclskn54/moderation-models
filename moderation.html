<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moderation</title>
</head>
<body>

<script>

window.addEventListener("message", async (event)=>{

    if(!event.data) return;
    if(event.data.type !== "CHECK_IMAGE") return;

    const image = event.data.image;

    // Basit kontrol
    let safe = true;
    let reason = "SAFE";

    // Çok büyük base64 ise şüpheli kabul et
    if(image.length > 3000000){
        safe = false;
        reason = "IMAGE_TOO_LARGE";
    }

    parent.postMessage({
        type:"MODERATION_RESULT",
        safe:safe,
        reason:reason
    },"*");

});

parent.postMessage({
    type:"MODERATION_READY"
},"*");

</script>

</body>
</html>
